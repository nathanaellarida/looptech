name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege. pull-requests:read lets the scanner enumerate PR commits.
permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action to scan pull_request events.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No license needed for public repositories.
          GITLEAKS_CONFIG: .gitleaks.toml
