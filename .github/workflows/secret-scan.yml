name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege by default.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No license needed for public repositories.
          GITLEAKS_CONFIG: .gitleaks.toml
